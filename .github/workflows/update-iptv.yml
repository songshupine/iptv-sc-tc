# .github/workflows/update-iptv.yml
name: Auto Update IPTV List

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 时间凌晨 2 点运行（即北京时间上午 10 点）
  workflow_dispatch:      # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 建议固定版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r script/requirements.txt   # 👈 关键：安装包括 pytz 在内的所有依赖

      - name: Run home.py
        run: python scripts/home.py
      - name: Update README update time
        run: |
              export TZ='Asia/Shanghai'
              CURRENT_TIME=$(date +'%Y-%m-%d %H:%M')
              sed -i -E "s/(\\*\\*更新时间\\*\\*：)[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}/\1${CURRENT_TIME}/" readme.md
      - name: Commit and push changes (if any)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update IPTV channels [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
          else
            echo "No changes to commit."
          fi
